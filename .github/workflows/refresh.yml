name: Weekly Data Refresh & Deploy

# Runs the live-data fetch pipeline on a weekly schedule, commits the refreshed
# JSON + site-data.ts back to main, then builds and deploys to GitHub Pages.
#
# Self-contained (fetch → commit → build → deploy) on purpose: a commit pushed
# with the default GITHUB_TOKEN does NOT re-trigger other workflows, so we do the
# build+deploy here rather than relying on deploy.yml's push trigger.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   FRED_API_KEY        (required — bonds + US macro)
#   TWELVEDATA_API_KEY  (optional — only if commodities are migrated to Twelve Data)
#   QUANDL_API_KEY      (optional — only if fetch:bonds is enabled)
#
# NOTE: Alpha Vantage commodities come via the MCP connector and cannot refresh
# in CI. They keep their last committed value until refreshed locally.

on:
  schedule:
    # 16:30 UTC every Sunday  ≈  12:30 EDT / 22:00 IST. Acts as a backstop to the
    # local Sunday-morning Claude scheduled task ("weekly-sunday-site-refresh"):
    # if the Mac was off and the local refresh didn't run, this still lands the
    # weekly data update on Sunday. GitHub cron is always UTC (no DST adjust).
    - cron: "30 16 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write   # commit refreshed data back to main
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies (yfinance)
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --quiet --upgrade pip
          ./.venv/bin/pip install --quiet yfinance pandas

      - name: Fetch live data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          QUANDL_API_KEY: ${{ secrets.QUANDL_API_KEY }}
        run: |
          # Each step is best-effort — a single provider hiccup must not
          # abort the whole refresh.
          npm run fetch:yahoo   || echo "::warning::yahoo fetch failed"
          npm run fetch:fred    || echo "::warning::fred fetch failed"
          npm run fetch:heatmap || echo "::warning::heatmap fetch failed"
          # Patch live values (equities, bonds, macro, commodities, crypto, FX)
          # from the Yahoo + FRED dumps into site-data.ts, then the heatmap.
          node scripts/patch-site-data.mjs || echo "::warning::site-data patch failed"
          npm run patch:heatmap || echo "::warning::heatmap patch failed"

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/ || true
          if git diff --staged --quiet; then
            echo "No data changes this week."
          else
            git commit -m "data: weekly automated refresh ($(date -u '+%Y-%m-%d'))"
            git push
          fi

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /finance-with-kunal

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: refresh
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
